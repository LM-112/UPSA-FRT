{% extends "base.html" %}
{% block title %}Login &middot; {{ INSTITUTION_SHORT }} FRT{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-3 text-center" style="color:var(--upsa-primary);">
          <i class="bi bi-shield-lock"></i>
          {{ INSTITUTION_SHORT }} Attendance Login
        </h4>
        <p class="text-muted small text-center mb-4">
          {{ INSTITUTION_NAME }}<br>
          Academic Year {{ ACADEMIC_YEAR }}
        </p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn w-100" style="background:var(--upsa-primary); color:#fff;">
            <i class="bi bi-box-arrow-in-right"></i> Sign in
          </button>
        </form>
        <hr>
        <small class="text-muted">
          For first-time access, contact your department administrator.
        </small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
